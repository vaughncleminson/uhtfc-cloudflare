name: Build - with secrets

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  build:
    name: Build (uses secrets)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build worker artifacts (OpenNext)
        run: npm run build:worker

      - name: Upload OpenNext build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opennext-build
          path: |
            .open-next/**
            .next/BUILD_ID
          if-no-files-found: error

  deploy:
    name: Deploy (optional)
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    env:
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download OpenNext build artifacts
        uses: actions/download-artifact@v4
        with:
          name: opennext-build
          path: .

      - name: Deploy to Cloudflare (OpenNext)
        run: npx opennextjs-cloudflare deploy --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          CLOUDFLARE_ENV: production
